<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h1 {
            margin-bottom: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .link-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            text-decoration: none;
            color: white;
            background: #2c2c2c;
            padding: 15px 30px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: bold;
            border: 1px solid transparent;
        }
        .btn:hover {
            background: #3d3d3d;
            border-color: #555;
            transform: translateY(-2px);
        }
        .btn-yt { border-left: 4px solid #ff0000; }
        .btn-proxy { border-left: 4px solid #00aaff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ACCESS PANEL</h1>
        <div class="link-box">
            <a href="https://www.unblockyoutube.co/" class="btn btn-yt" target="_blank">YouTube Unblocked</a>
            <a href="https://www.croxyproxy.com/social" class="btn btn-proxy" target="_blank">CroxyProxy Social</a>
        </div>
    </div>

</body>
</html>
