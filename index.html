<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 250px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 10px;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #00aaff;
            text-align: center;
            letter-spacing: 1px;
        }

        .nav-btn {
            padding: 12px;
            background: #2c2c2c;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .nav-btn:hover {
            background: #444;
        }

        /* Content Area */
        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .placeholder {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>DASHBOARD</h2>
        <button class="nav-btn" onclick="loadSite('https://www.unblockyoutube.co/')">YouTube Unblock</button>
        <button class="nav-btn" onclick="loadSite('https://www.croxyproxy.com/social')">CroxyProxy Social</button>
        <button class="nav-btn" style="margin-top: auto; background: #333;" onclick="location.reload()">Refresh App</button>
    </div>

    <div class="content">
        <iframe id="main-frame" name="view" src="about:blank"></iframe>
    </div>

    <script>
        function loadSite(url) {
            document.getElementById('main-frame').src = url;
        }
        
        // Load the first site by default
        window.onload = function() {
            loadSite('https://www.unblockyoutube.co/');
        };
    </script>

</body>
</html>
