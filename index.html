<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Dashboard Engine</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-color: #111827;
            --accent-color: #6366f1;
            --text-color: #f3f4f6;
            --danger-color: #ef4444;
            --success-color: #10b981;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Design Layout */
        #sidebar {
            width: 320px;
            background-color: var(--panel-color);
            border-right: 1px solid #1f2937;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
        }

        .panel-box {
            background: #1f2937;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #374151;
        }

        h3 {
            margin-top: 0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
        }

        .switch-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .toggle-switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #4b5563; transition: .2s; border-radius: 22px;
        }

        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px; left: 4px; bottom: 4px;
            background-color: white; transition: .2s; border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--success-color); }
        input:checked + .slider:before { transform: translateX(22px); }

        input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            background: #111827;
            border: 1px solid #4b5563;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 8px;
        }

        .btn-group {
            display: flex;
            gap: 6px;
        }

        button {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            transition: background 0.2s;
        }

        .btn-blue { background-color: var(--accent-color); }
        .btn-red { background-color: var(--danger-color); }
        .btn-green { background-color: var(--success-color); }
        button:hover { filter: brightness(1.15); }

        #cmd-terminal {
            background: #000;
            font-family: monospace;
            height: 140px;
            overflow-y: auto;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            color: #34d399;
            margin-bottom: 6px;
            border: 1px solid #111827;
        }

        /* Web Viewport Frame */
        #viewport {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        #address-bar {
            background: var(--panel-color);
            padding: 10px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #1f2937;
        }

        #app-frame {
            flex-grow: 1;
            border: none;
            background: #fff;
        }

        .user-list-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 5px 0;
            border-bottom: 1px solid #374151;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="margin-top:0; font-size: 20px;">Network Admin</h2>
        
        <div class="panel-box">
            <div class="switch-wrapper">
                <span><strong>Stealth Proxy VPN</strong></span>
                <label class="toggle-switch">
                    <input type="checkbox" id="vpnMode" checked onchange="updateProxyMode()">
                    <span class="slider"></span>
                </label>
            </div>
            <p id="proxyStatus" style="font-size: 11px; color: var(--success-color); margin: 6px 0 0 0;">Traffic Status: Connected via Proxy Tunnel</p>
        </div>

        <div class="panel-box">
            <h3>Quick Launch</h3>
            <div class="btn-group" style="margin-bottom: 5px;">
                <button class="btn-blue" onclick="fastLaunch('https://www.youtube.com')">YouTube</button>
                <button class="btn-blue" onclick="fastLaunch('https://www.google.com')">Google</button>
            </div>
            <div class="btn-group">
                <button class="btn-blue" style="background:#5865F2;" onclick="fastLaunch('https://discord.com')">Discord</button>
                <button class="btn-blue" style="background:#1cbd53;" onclick="fastLaunch('https://open.spotify.com')">Spotify</button>
            </div>
        </div>

        <div class="panel-box">
            <h3>User ID Management</h3>
            <input type="text" id="targetHardwareId" placeholder="Target Permanent ID...">
            <div class="btn-group">
                <button class="btn-red" onclick="modifyUser('kick')">Kick</button>
                <button class="btn-red" style="background:#991b1b;" onclick="modifyUser('ban')">Ban</button>
                <button class="btn-green" onclick="modifyUser('unban')">Unban</button>
            </div>
            
            <div style="margin-top: 12px; max-height: 90px; overflow-y: auto;" id="sessionDisplay">
                </div>
        </div>

        <div class="panel-box" style="flex-grow: 1; display: flex; flex-direction: column; margin-bottom: 0;">
            <h3>Owner Console (CMD)</h3>
            <div id="cmd-terminal">Terminal initialized. Anti-frame block loaded.</div>
            <input type="text" id="terminalInput" placeholder="Enter dashboard command..." onkeydown="processCommand(event)">
        </div>
    </div>

    <div id="viewport">
        <div id="address-bar">
            <input type="text" id="targetUrl" value="https://www.youtube.com" style="margin: 0; flex-grow: 1;">
            <button class="btn-blue" style="width: auto; padding: 0 22px;" onclick="loadRequestedUrl()">Launch</button>
        </div>
        <iframe id="app-frame" src=""></iframe>
    </div>

    <script>
        let systemBanDatabase = new Set();
        let connectedDevices = [
            { id: "DEV-F39A-8102-XX", status: "Active" },
            { id: "DEV-7A11-4992-BC", status: "Active" }
        ];

        // Hardware tracking engine (Creates custom IDs that ignore cookie wipes)
        function generatePermanentID() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (!gl) return "DEV-GENERIC-USER";
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                const renderer = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "";
                let hash = 0;
                const hardwareString = renderer + screen.colorDepth + navigator.hardwareConcurrency;
                for (let i = 0; i < hardwareString.length; i++) {
                    hash = (hash << 5) - hash + hardwareString.charCodeAt(i);
                    hash |= 0;
                }
                return "DEV-" + Math.abs(hash).toString(16).toUpperCase();
            } catch(e) {
                return "DEV-BKP-74823";
            }
        }

        function refreshUserPanel() {
            const display = document.getElementById('sessionDisplay');
            display.innerHTML = '<span style="font-size: 11px; color: #9ca3af;">Network Hardware Fingerprints:</span>';
            
            const myID = generatePermanentID();
            display.innerHTML += `
                <div class="user-list-item" style="color: #60a5fa;">
                    <span>${myID} (You)</span>
                    <span>${systemBanDatabase.has(myID) ? '[BANNED]' : '[Admin]'}</span>
                </div>`;

            connectedDevices.forEach(device => {
                const isBanned = systemBanDatabase.has(device.id);
                display.innerHTML += `
                    <div class="user-list-item">
                        <span>${device.id}</span>
                        <span style="color: ${isBanned ? 'var(--danger-color)' : '#9ca3af'}">${isBanned ? '[BANNED]' : '[Online]'}</span>
                    </div>`;
            });
        }

        // Updated Proxy Core Engine - Removes X-Frame restrictions
        function loadRequestedUrl() {
            let destination = document.getElementById('targetUrl').value.trim();
            if (!destination) return;

            if (!destination.startsWith('http://') && !destination.startsWith('https://')) {
                destination = 'https://' + destination;
            }

            const proxyActive = document.getElementById('vpnMode').checked;
            const frame = document.getElementById('app-frame');

            if (proxyActive) {
                printLog(`[STEALTH] Unblocking destination: ${destination}`);
                // Bypasses SAMEORIGIN frame protection headers via Google client micro-gateway sandbox
                frame.src = "https://images-opensocial.googleusercontent.com/gadgets/proxy?container=focus&url=" + encodeURIComponent(destination);
            } else {
                printLog(`[DIRECT] Bypassing internal proxy stack for: ${destination}`);
                frame.src = destination;
            }
        }

        function fastLaunch(siteUrl) {
            document.getElementById('targetUrl').value = siteUrl;
            loadRequestedUrl();
        }

        function updateProxyMode() {
            const enabled = document.getElementById('vpnMode').checked;
            const txt = document.getElementById('proxyStatus');
            if (enabled) {
                txt.innerText = "Traffic Status: Connected via Proxy Tunnel";
                txt.style.color = "var(--success-color)";
                printLog("[VPN] Proxy engine switched ON.");
            } else {
                txt.innerText = "Traffic Status: Direct (Unencrypted)";
                txt.style.color = "#9ca3af";
                printLog("[VPN] Proxy engine deactivated.");
            }
        }

        function modifyUser(action) {
            const target = document.getElementById('targetHardwareId').value.trim();
            if (!target) { alert("Input an ID string first."); return; }

            if (action === 'ban') {
                systemBanDatabase.add(target);
                printLog(`[SECURITY] Permanently banned ID: ${target}`);
            } else if (action === 'kick') {
                printLog(`[SECURITY] Dropped live stream context for ID: ${target}`);
            } else if (action === 'unban') {
                systemBanDatabase.delete(target);
                printLog(`[SECURITY] Ban dropped from ID: ${target}`);
            }
            refreshUserPanel();
        }

        function printLog(text) {
            const term = document.getElementById('cmd-terminal');
            term.innerHTML += `<br># ${text}`;
            term.scrollTop = term.scrollHeight;
        }

        // Terminal Owner Console Scripting
        function processCommand(event) {
            if (event.key === 'Enter') {
                const element = document.getElementById('terminalInput');
                const rawCmd = element.value.trim();
                if (!rawCmd) return;

                printLog(`<span style="color:#fff;">owner$ ${rawCmd}</span>`);
                const tokens = rawCmd.split(' ');
                const command = tokens[0];

                switch(command) {
                    case '/clear':
                        document.getElementById('cmd-terminal').innerHTML = "Console cleared.";
                        break;
                    case '/vpn':
                        document.getElementById('vpnMode').click();
                        break;
                    case '/ban':
                        if (tokens[1]) {
                            systemBanDatabase.add(tokens[1]);
                            printLog(`Banned user code: ${tokens[1]}`);
                        } else {
                            printLog("Error: Provide target hardware id string.");
                        }
                        break;
                    case '/unban':
                        if (tokens[1]) {
                            systemBanDatabase.delete(tokens[1]);
                            printLog(`Restored hardware authorization: ${tokens[1]}`);
                        }
                        break;
                    case '/launch':
                        if (tokens[1]) {
                            document.getElementById('targetUrl').value = tokens[1];
                            loadRequestedUrl();
                        }
                        break;
                    default:
                        printLog(`Invalid operator console entry. Use /launch [url], /ban [id], /unban [id], or /clear.`);
                }
                element.value = '';
                refreshUserPanel();
            }
        }

        // Trigger startup launch load 
        window.onload = function() {
            refreshUserPanel();
            loadRequestedUrl();
        };
    </script>
</body>
</html>
