<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Security Gateway Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Top Workspace Layout Wrapper */
        .workspace-wrapper {
            display: flex;
            flex-grow: 1;
            width: 100%;
            height: calc(100% - 180px); /* Leaves exact space for the bottom console panel */
        }

        /* Sidebar Navigation Layout */
        .sidebar {
            width: 260px;
            background: #16161a;
            border-right: 1px solid #2d2d35;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 10px;
            flex-shrink: 0;
            height: 100%;
        }

        .sidebar h2 {
            font-size: 1.1rem;
            color: #00aaff;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .nav-btn {
            padding: 12px;
            background: #222227;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            text-align: left;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .nav-btn:hover {
            background: #2d2d35;
        }

        .nav-btn.active {
            background: rgba(0, 170, 255, 0.15);
            color: #00aaff;
            border-left: 4px solid #00aaff;
        }

        /* Content Area Container */
        .content {
            flex-grow: 1;
            height: 100%;
            background: #121214;
            position: relative;
        }

        /* Clean Embedded Frame Canvas */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* FULLSCREEN BOTTOM TERMINAL LAYER */
        .admin-terminal-section {
            width: 100%;
            height: 180px; /* Locked bottom heights panel */
            background: #131316;
            border-top: 1px solid #2d2d35;
            padding: 12px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
            z-index: 10;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-family: monospace;
            color: #8a8a93;
        }

        .terminal-meta {
            font-weight: 600;
        }

        .terminal-screen {
            flex-grow: 1;
            background-color: #09090b;
            color: #00aaff;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 10px;
            border-radius: 6px;
            overflow-y: auto;
            border: 1px solid #222;
        }

        .terminal-input-wrapper {
            display: flex;
            align-items: center;
            background-color: #1c1c21;
            border-radius: 6px;
            padding: 2px 12px;
            border: 1px solid #2d2d35;
        }

        .terminal-prompt {
            font-family: monospace;
            font-size: 13px;
            color: #8a8a93;
            margin-right: 8px;
            font-weight: bold;
        }

        .terminal-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            font-family: monospace;
            font-size: 13px;
            outline: none;
            color: white;
        }
    </style>
</head>
<body>

    <div class="workspace-wrapper">
        <aside class="sidebar">
            <h2>NAVIGATION PANEL</h2>
            <button id="btn-yt" class="nav-btn active" onclick="loadFrame('https://www.youtube.com/', 'btn-yt')">YouTube</button>
            <button id="btn-tt" class="nav-btn" onclick="loadFrame('https://www.tiktok.com/', 'btn-tt')">TikTok Hub</button>
            <button id="btn-school" class="nav-btn" onclick="loadFrame('https://wikipedia.org', 'btn-school')">School Content Gateway</button>
            <button class="nav-btn" style="margin-top: auto; background: #222227; color: #aaa;" onclick="location.reload()">Refresh App</button>
        </aside>

        <main class="content" id="viewportCanvas">
            <iframe id="main-frame" src="about:blank" allow="autoplay; encrypted-media; fullscreen;"></iframe>
        </main>
    </div>

    <div class="admin-terminal-section">
        <div class="terminal-header">
            <div>Terminal Session Link Channel</div>
            <div class="terminal-meta">
                Player Name: <span id="lblPlayer" style="color: #00ff77; margin-right: 15px;">...</span> 
                Identity: <span id="lblUser" style="color: #00aaff; margin-right: 15px;">...</span> | 
                Permission: <span id="lblRole" style="color: #aaa;">Guest</span>
            </div>
        </div>
        <div id="terminalLog" class="terminal-screen"></div>
        <div class="terminal-input-wrapper">
            <span class="terminal-prompt">admin$</span>
            <input type="text" id="cmdInput" class="terminal-input" placeholder="Type administrative commands here (e.g., online, role Owner, name Neo)..." onkeypress="execCommand(event)">
        </div>
    </div>

    <script>
        let userRole = "Guest";
        let username = "";
        let playerName = "";

        // Instantiates local simulation storage variables
        function initializeSystem() {
            // Setup persistent User ID
            if (localStorage.getItem('portal_user')) {
                username = localStorage.getItem('portal_user');
            } else {
                username = "User_" + Math.floor(1000 + Math.random() * 9000);
                localStorage.setItem('portal_user', username);
            }
            document.getElementById('lblUser').innerText = username;

            // Setup persistent Player Name
            if (localStorage.getItem('player_name')) {
                playerName = localStorage.getItem('player_name');
            } else {
                playerName = "Player_" + Math.floor(100 + Math.random() * 900);
                localStorage.setItem('player_name', playerName);
            }
            document.getElementById('lblPlayer').innerText = playerName;

            // Check persistent Role escalation memory state
            if (localStorage.getItem('portal_role')) {
                userRole = localStorage.getItem('portal_role');
                document.getElementById('lblRole').innerText = userRole;
                if (userRole === "Owner") {
                    document.getElementById('lblRole').style.color = "#00ff77";
                }
            }

            // Check restriction block vectors
            if (localStorage.getItem('isBanned') === 'true' || localStorage.getItem('isKicked') === 'true') {
                applyAccessBlock();
            } else {
                logPrint(`Terminal connection gateway open. Security checks cleared for profile handle: [${playerName}]`);
            }
        }

        function logPrint(msg) {
            const screen = document.getElementById('terminalLog');
            if(screen) {
                screen.innerHTML += `<div><span style="color:#555;">[${new Date().toLocaleTimeString()}]</span> ${msg}</div>`;
                screen.scrollTop = screen.scrollHeight;
            }
        }

        function loadFrame(url, btnId) {
            if (localStorage.getItem('isBanned') === 'true' || localStorage.getItem('isKicked') === 'true') {
                return;
            }
            
            let targetUrl = url;
            
            // AUTOMATED PROXY REDIRECTION: Bypasses network blocks automatically
            if (url.includes('youtube.com') || url.includes('tiktok.com')) {
                logPrint(`Proxy Tunnel Triggered: Encapsulating external stream feed securely...`);
                targetUrl = "https://www.croxyproxy.com/_embed/processing?url=" + encodeURIComponent(url);
            }

            document.getElementById('main-frame').src = targetUrl;
            logPrint(`Updating active framework layout container to: ${url}`);

            document.querySelectorAll('.sidebar .nav-btn').forEach(btn => btn.classList.remove('active'));
            if(btnId) {
                document.getElementById(btnId).classList.add('active');
            }
        }

        function applyAccessBlock() {
            document.getElementById('viewportCanvas').innerHTML = `
                <div style="text-align:center; padding: 150px 20px; color:#ff4444; background: #0b0b0d; height: 100%;">
                    <h1 style="font-size: 34px; font-weight:700; margin-bottom: 12px; font-family: sans-serif;">🔴 System Access Revoked</h1>
                    <p style="color:#777; font-size:14px; font-family: monospace;">Administrative restrictions active on terminal client token signature: <b>${username}</b></p>
                    <p style="color:#444; font-size:12px; font-family: monospace; margin-top: 10px;">Type /unban ${username} in the terminal line below to reset database state flags.</p>
                </div>
            `;
        }

        // Administrative Command Terminal Script Logic
        function execCommand(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('cmdInput');
                const cmd = input.value.trim();
                if (!cmd) return;

                // Output typed line to log viewport screen 
                logPrint(`<span style="color:#fff;">$ ${cmd}</span>`);

                const args = cmd.split(' ');
                const primaryInstruction = args[0];

                // 1. Name assignment logic
                if (primaryInstruction === "name" && args[1]) {
                    const newName = cmd.substring(5).trim();
                    playerName = newName;
                    localStorage.setItem('player_name', newName);
                    document.getElementById('lblPlayer').innerText = newName;
                    logPrint(`Player name profile assignment successfully shifted to: <span style="color:#00ff77;">${newName}</span>`);
                } 
                // 2. Role escalation verification
                else if (cmd === "role Owner") {
                    userRole = "Owner";
                    localStorage.setItem('portal_role', 'Owner');
                    document.getElementById('lblRole').innerText = "Owner";
                    document.getElementById('lblRole').style.color = "#00ff77";
                    logPrint("Permissions status authenticated: Master Owner access keys mapped.");
                } 
                // 3. System profile status view
                else if (cmd === "online") {
                    logPrint("--- Local Sandbox Security Registry Tracking ---");
                    logPrint(`Active Node: ${playerName} | Security Identifier: ${username} | Clearance: ${userRole}`);
                } 
                // 4. Session Kick simulator logic
                else if (primaryInstruction === "/kick") {
                    if (userRole !== "Owner") { logPrint("Error code: Operation blocked. Owner privileges required."); input.value = ''; return; }
                    const target = args[1];
                    if (target === username || target === playerName) {
                        logPrint(`Executing immediate session pipeline kill routine for: ${target}`);
                        localStorage.setItem('isKicked', 'true');
                        setTimeout(applyAccessBlock, 500);
                    } else {
                        logPrint(`Simulation target user "${target}" is not active on this node interface.`);
                    }
                } 
                // 5. Persistent Ban simulation flag logic
                else if (primaryInstruction === "/ban") {
                    if (userRole !== "Owner") { logPrint("Error code: Operation blocked. Owner privileges required."); input.value = ''; return; }
                    const target = args[1];
                    if (target === username || target === playerName) {
                        logPrint(`Writing hardware block entry to file storage for user index: ${target}`);
                        localStorage.setItem('isBanned', 'true');
                        setTimeout(applyAccessBlock, 500);
                    } else {
                        logPrint(`Simulation target user "${target}" is not active on this node interface.`);
                    }
                } 
                // 6. Purge block restriction logic (Can be executed from terminal layout)
                else if (primaryInstruction === "/unban") {
                    if (userRole !== "Owner") { logPrint("Error code: Operation blocked. Owner privileges required."); input.value = ''; return; }
                    const target = args[1];
                    if (target === username || target === playerName) {
                        logPrint(`Purging restriction logs from system registry values for: ${target}`);
                        localStorage.removeItem('isBanned');
                        localStorage.removeItem('isKicked');
                        window.location.reload();
                    } else {
                        logPrint(`Target file parameter token record mapping matching "${target}" not found.`);
                    }
                } else {
                    logPrint("<span style='color:#ff4444;'>Command not recognized or access matrix verification failed.</span>");
                }
                input.value = '';
            }
        }

        window.onload = function() {
            initializeSystem();
            loadFrame('https://www.youtube.com/', 'btn-yt');
        };
    </script>
</body>
</html>
