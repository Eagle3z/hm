<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Management Network</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-color: #111827;
            --accent-color: #6366f1;
            --text-color: #f3f4f6;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --game-color: #f59e0b;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Control Center Layout */
        #sidebar {
            width: 320px;
            background-color: var(--panel-color);
            border-right: 1px solid #1f2937;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .panel-box {
            background: #1f2937;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid #374151;
        }

        h3 {
            margin-top: 0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
        }

        /* Forms, Buttons & Inputs */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 8px 12px;
            background: #111827;
            border: 1px solid #4b5563;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 8px;
        }

        .btn-group {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }

        button {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            transition: background 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }

        .btn-blue { background-color: var(--accent-color); }
        .btn-red { background-color: var(--danger-color); }
        .btn-green { background-color: var(--success-color); }
        .btn-orange { background-color: var(--game-color); }
        button:hover { filter: brightness(1.15); }

        #cmd-terminal {
            background: #000;
            font-family: monospace;
            height: 100px;
            overflow-y: auto;
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
            color: #34d399;
            margin-bottom: 6px;
            border: 1px solid #111827;
        }

        /* Viewport Panels */
        #viewport {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: #2d3748;
            position: relative;
        }

        #address-bar {
            background: var(--panel-color);
            padding: 10px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #1f2937;
        }

        #app-frame {
            flex-grow: 1;
            border: none;
            background: #111827;
        }

        #local-app-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: none;
            background: #1e293b;
            color: white;
        }

        .user-list-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 6px 0;
            border-bottom: 1px solid #374151;
            align-items: center;
        }

        /* Hidden Admin Tools Style */
        .admin-only-section {
            display: none;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="margin-top:0; font-size: 18px; letter-spacing: 0.5px;">Workspace Console</h2>
        
        <div class="panel-box" id="loginBox">
            <h3>System Verification</h3>
            <input type="password" id="adminKeyInput" placeholder="Enter Access Key (admin1)...">
            <button class="btn-green" onclick="verifyAdminAccess()">Login Admin</button>
        </div>

        <div class="panel-box">
            <h3>App Quick Launch</h3>
            <div class="btn-group">
                <button class="btn-blue" style="background: #ef4444;" onclick="launchYouTubeEmbed()">YouTube Fix</button>
                <button class="btn-blue" onclick="fastLaunch('https://www.google.com')">Google</button>
            </div>
        </div>

        <div class="panel-box">
            <h3>Arcade Deck (Local Engine)</h3>
            <div class="btn-group">
                <button class="btn-orange" onclick="launchLocalApp('snake')">Retro Snake</button>
                <button class="btn-orange" onclick="launchLocalApp('clicker')">Cookie Clicker</button>
            </div>
            <div class="btn-group" style="margin-bottom: 0;">
                <button class="btn-orange" style="background:#0d9488;" onclick="launchLocalApp('tictactoe')">Tic-Tac-Toe</button>
            </div>
        </div>

        <div class="panel-box">
            <h3>Live Connected Users</h3>
            <div style="max-height: 120px; overflow-y: auto; padding-right: 2px;" id="sessionDisplay">
                </div>
        </div>

        <div class="panel-box admin-only-section">
            <h3>User Enforcement (Fixed ID)</h3>
            <input type="text" id="targetHardwareId" placeholder="Select or type Target HWID...">
            <div class="btn-group" style="margin-bottom: 0;">
                <button class="btn-red" onclick="modifyUser('kick')">Kick</button>
                <button class="btn-red" style="background:#991b1b;" onclick="modifyUser('ban')">Ban</button>
                <button class="btn-green" onclick="modifyUser('unban')">Unban</button>
            </div>
        </div>

        <div class="panel-box admin-only-section" style="flex-grow: 1; display: flex; flex-direction: column; margin-bottom: 0;">
            <h3>Owner Console (CMD)</h3>
            <div id="cmd-terminal">Terminal secure. Dynamic pipelines functional.</div>
            <input type="text" id="terminalInput" placeholder="Enter command..." onkeydown="processCommand(event)">
        </div>
    </div>

    <div id="viewport">
        <div id="address-bar">
            <input type="text" id="targetUrl" value="https://www.youtube.com" style="margin: 0; flex-grow: 1;">
            <button class="btn-blue" style="width: auto; padding: 0 22px;" onclick="loadRequestedUrl()">Launch URL</button>
        </div>
        
        <iframe id="app-frame" src=""></iframe>
        <div id="local-app-container"></div>
    </div>

    <script>
        let systemBanDatabase = new Set();
        let isAdminAuthenticated = false;

        // Realistic Network Stream List Database (Users change dynamically to simulate live system)
        let liveConnectedUsers = [
            { id: "HWID-A482-9901-XX", status: "Active" },
            { id: "HWID-8F12-4043-BC", status: "Active" },
            { id: "HWID-391B-7411-FA", status: "Active" }
        ];

        // Unique Hardware Key Identifier Generator
        function generatePermanentID() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (!gl) return "HWID-LOCAL-USER";
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                const renderer = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "";
                let hash = 0;
                const hardwareString = renderer + screen.colorDepth + navigator.hardwareConcurrency;
                for (let i = 0; i < hardwareString.length; i++) {
                    hash = (hash << 5) - hash + hardwareString.charCodeAt(i);
                    hash |= 0;
                }
                return "HWID-" + Math.abs(hash).toString(16).toUpperCase().substring(0, 14);
            } catch(e) {
                return "HWID-FAILSAFE";
            }
        }

        // Real-Time Login Validation Check
        function verifyAdminAccess() {
            const password = document.getElementById('adminKeyInput').value;
            const loginBox = document.getElementById('loginBox');
            const adminElements = document.querySelectorAll('.admin-only-section');

            if (password === 'admin1') {
                isAdminAuthenticated = true;
                loginBox.innerHTML = `<p style="color: var(--success-color); font-weight: bold; margin: 0; font-size:13px;">✓ Authenticated Administrator</p>`;
                
                // Unveil hidden panels instantly
                adminElements.forEach(element => {
                    element.style.display = "block";
                    if (element.style.flexDirection === "") {
                        element.style.display = "flex";
                    }
                });
                
                printLog("[SYSTEM] Operator parameters accepted. Admin unlocked.");
                refreshUserPanel();
            } else {
                alert("Access Denied: Invalid Security Token.");
            }
        }

        // Live Dynamic Population Control Logic
        function refreshUserPanel() {
            const display = document.getElementById('sessionDisplay');
            display.innerHTML = '';
            
            const myID = generatePermanentID();
            const myBanStatus = systemBanDatabase.has(myID);

            // Print yourself
            display.innerHTML += `
                <div class="user-list-item" style="color: #60a5fa; cursor: pointer;" onclick="selectUser('${myID}')">
                    <span>${myID} (You)</span>
                    <span style="font-weight:bold;">${myBanStatus ? '[BANNED]' : '[Admin]'}</span>
                </div>`;

            // Print dynamic live users array
            liveConnectedUsers.forEach(user => {
                const isBanned = systemBanDatabase.has(user.id);
                display.innerHTML += `
                    <div class="user-list-item" style="cursor: pointer;" onclick="selectUser('${user.id}')">
                        <span>${user.id}</span>
                        <span style="color: ${isBanned ? 'var(--danger-color)' : 'var(--success-color)'}; font-weight: 500;">
                            ${isBanned ? '[BANNED]' : '[Online]'}
                        </span>
                    </div>`;
            });
        }

        function selectUser(id) {
            if (isAdminAuthenticated) {
                document.getElementById('targetHardwareId').value = id;
            }
        }

        // Simulated Network Stream Loop (Makes users join or leave every 15 seconds so it looks completely live)
        setInterval(() => {
            if (Math.random() > 0.6 && liveConnectedUsers.length < 5) {
                // Generate a random string simulation user ID
                let randID = "HWID-" + Math.floor(1000 + Math.random() * 9000) + "-BC" + Math.floor(10 + Math.random() * 89);
                liveConnectedUsers.push({ id: randID, status: "Active" });
                if (isAdminAuthenticated) printLog(`[NETWORK] User stream connection established: ${randID}`);
            } else if (liveConnectedUsers.length > 2) {
                let dropped = liveConnectedUsers.shift();
                if (isAdminAuthenticated) printLog(`[NETWORK] Connection terminated: ${dropped.id}`);
            }
            refreshUserPanel();
        }, 15000);

        // Core App Window Handling
        function launchYouTubeEmbed() {
            hideExternalFrame(false);
            document.getElementById('app-frame').src = "https://www.youtube.com/embed/jfKfPfyJRdk?list=PLrEnWoR7Gyh6rU6aP6SPrI0Y69KId_0p_";
            if (isAdminAuthenticated) printLog("[STREAM] Initialized secure media streaming channel.");
        }

        function hideExternalFrame(shouldHideLocal) {
            const frame = document.getElementById('app-frame');
            const localBox = document.getElementById('local-app-container');
            if(shouldHideLocal) {
                frame.style.display = "none";
                localBox.style.display = "block";
            } else {
                frame.style.display = "block";
                localBox.style.display = "none";
            }
        }

        function launchLocalApp(appName) {
            hideExternalFrame(true);
            const container = document.getElementById('local-app-container');

            if(appName === 'snake') {
                container.innerHTML = `<h2>Retro Snake Game</h2><p>Score: <span id="score">0</span>. Use Arrow Keys.</p><canvas id="snakeGame" width="400" height="400" style="background:#000; border:2px solid #fff; display:block; margin:0 auto;"></canvas>`;
                initSnakeGame();
            } else if (appName === 'clicker') {
                container.innerHTML = `<div style="text-align:center; padding-top:40px;"><h2>Cookie Clicker Alpha</h2><h1 id="count" style="font-size:64px; color:var(--game-color);">0</h1><button onclick="document.getElementById('count').innerText = parseInt(document.getElementById('count').innerText)+1" style="width:200px; height:200px; border-radius:50%; background:var(--accent-color); font-size:24px;">CLICK ME</button></div>`;
            } else if (appName === 'tictactoe') {
                container.innerHTML = `<h2>Tic-Tac-Toe App</h2><div style="display:grid; grid-template-columns: repeat(3, 100px); gap:5px; justify-content:center; margin-top:20px;">${Array(9).fill().map((_,i)=> `<button onclick="this.innerText='X'; this.disabled=true;" style="height:100px; background:#334155; font-size:32px;"></button>`).join('')}</div>`;
            }
        }

        function loadRequestedUrl() {
            hideExternalFrame(false);
            let destination = document.getElementById('targetUrl').value.trim();
            if (!destination) return;
            if (!destination.startsWith('http://') && !destination.startsWith('https://')) {
                destination = 'https://' + destination;
            }
            // Standard client-side routing fallback setup
            document.getElementById('app-frame').src = "https://womginx.arph.org/main/" + destination;
        }

        function fastLaunch(siteUrl) {
            document.getElementById('targetUrl').value = siteUrl;
            loadRequestedUrl();
        }

        // Administrative Kick/Ban Executions
        function modifyUser(action) {
            if (!isAdminAuthenticated) return;
            const target = document.getElementById('targetHardwareId').value.trim();
            if (!target) { alert("Select a user connection profile from the list."); return; }

            if (action === 'ban') {
                systemBanDatabase.add(target);
                printLog(`[SECURITY] ID ${target} permanently flagged and dropped.`);
            } else if (action === 'kick') {
                printLog(`[SECURITY] Severed live frame socket for signature: ${target}`);
                // Remove from live display temporary array simulation
                liveConnectedUsers = liveConnectedUsers.filter(u => u.id !== target);
            } else if (action === 'unban') {
                systemBanDatabase.delete(target);
                printLog(`[SECURITY] Re-authorized hardware execution for: ${target}`);
            }
            refreshUserPanel();
        }

        function printLog(text) {
            const term = document.getElementById('cmd-terminal');
            if(term) {
                term.innerHTML += `<br>> ${text}`;
                term.scrollTop = term.scrollHeight;
            }
        }

        function processCommand(event) {
            if (event.key === 'Enter') {
                const element = document.getElementById('terminalInput');
                const rawCmd = element.value.trim();
                if (!rawCmd) return;

                printLog(`<span style="color:#fff;">owner$ ${rawCmd}</span>`);
                const tokens = rawCmd.split(' ');
                const command = tokens[0];

                switch(command) {
                    case '/clear':
                        document.getElementById('cmd-terminal').innerHTML = "Buffer wiped.";
                        break;
                    case '/ban':
                        if (tokens[1]) {
                            systemBanDatabase.add(tokens[1]);
                            printLog(`Banned entry ID: ${tokens[1]}`);
                        }
                        break;
                    case '/unban':
                        if (tokens[1]) {
                            systemBanDatabase.delete(tokens[1]);
                            printLog(`Restored entry ID: ${tokens[1]}`);
                        }
                        break;
                    default:
                        printLog(`Command invalid. System commands: /ban [id], /unban [id], /clear`);
                }
                element.value = '';
                refreshUserPanel();
            }
        }

        function initSnakeGame() {
            const canvas = document.getElementById("snakeGame"); if(!canvas) return;
            const ctx = canvas.getContext("2d"); let box = 20; let snake = [{x: 9 * box, y: 10 * box}];
            let direction = "RIGHT"; let score = 0;
            let food = {x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box};
            document.addEventListener("keydown", e => {
                if(e.keyCode == 37 && direction != "RIGHT") direction = "LEFT";
                else if(e.keyCode == 38 && direction != "DOWN") direction = "UP";
                else if(e.keyCode == 39 && direction != "LEFT") direction = "RIGHT";
                else if(e.keyCode == 40 && direction != "UP") direction = "DOWN";
            });
            let game = setInterval(() => {
                ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                for(let i=0; i<snake.length; i++) {
                    ctx.fillStyle = (i == 0)? "var(--accent-color)" : "#fff";
                    ctx.fillRect(snake[i].x, snake[i].y, box, box);
                }
                ctx.fillStyle = "var(--danger-color)"; ctx.fillRect(food.x, food.y, box, box);
                let snakeX = snake[0].x; let snakeY = snake[0].y;
                if(direction == "LEFT") snakeX -= box; if(direction == "UP") snakeY -= box;
                if(direction == "RIGHT") snakeX += box; if(direction == "DOWN") snakeY += box;
                if(snakeX == food.x && snakeY == food.y) {
                    score++; document.getElementById("score").innerText = score;
                    food = {x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box};
                } else { snake.pop(); }
                let newHead = {x: snakeX, y: snakeY};
                if(snakeX < 0 || snakeX > 19*box || snakeY < 0 || snakeY > 19*box || snake.some(s=>s.x===newHead.x && s.y===newHead.y)) {
                    clearInterval(game); printLog("[ARCADE] Snake game terminated. Score: " + score);
                }
                snake.unshift(newHead);
            }, 100);
        }

        window.onload = function() {
            refreshUserPanel();
            launchYouTubeEmbed();
        };
    </script>
</body>
</html>
