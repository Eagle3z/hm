<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Network Core</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-color: #111827;
            --accent-color: #6366f1;
            --text-color: #f3f4f6;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --game-color: #f59e0b;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Dashboard Element */
        #sidebar {
            width: 320px;
            background-color: var(--panel-color);
            border-right: 1px solid #1f2937;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .panel-box {
            background: #1f2937;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid #374151;
        }

        h3 {
            margin-top: 0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
        }

        .switch-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .toggle-switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #4b5563; transition: .2s; border-radius: 22px;
        }

        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px; left: 4px; bottom: 4px;
            background-color: white; transition: .2s; border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--success-color); }
        input:checked + .slider:before { transform: translateX(22px); }

        input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            background: #111827;
            border: 1px solid #4b5563;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 8px;
        }

        .btn-group {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }

        button {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            transition: background 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }

        .btn-blue { background-color: var(--accent-color); }
        .btn-red { background-color: var(--danger-color); }
        .btn-green { background-color: var(--success-color); }
        .btn-orange { background-color: var(--game-color); }
        button:hover { filter: brightness(1.15); }

        #cmd-terminal {
            background: #000;
            font-family: monospace;
            height: 110px;
            overflow-y: auto;
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
            color: #34d399;
            margin-bottom: 6px;
            border: 1px solid #111827;
        }

        /* Web Viewport View */
        #viewport {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        #address-bar {
            background: var(--panel-color);
            padding: 10px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #1f2937;
        }

        #app-frame {
            flex-grow: 1;
            border: none;
            background: #fff;
        }

        .user-list-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 4px 0;
            border-bottom: 1px solid #374151;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="margin-top:0; font-size: 18px; letter-spacing: 0.5px;">Network Admin</h2>
        
        <div class="panel-box">
            <div class="switch-wrapper">
                <span><strong>Stealth Tunnel VPN</strong></span>
                <label class="toggle-switch">
                    <input type="checkbox" id="vpnMode" checked onchange="updateProxyMode()">
                    <span class="slider"></span>
                </label>
            </div>
            <p id="proxyStatus" style="font-size: 11px; color: var(--success-color); margin: 6px 0 0 0;">Traffic Status: Connected via Sandbox Proxy</p>
        </div>

        <div class="panel-box">
            <h3>App Quick Launch</h3>
            <div class="btn-group">
                <button class="btn-blue" style="background: #ef4444;" onclick="launchYouTube()">YouTube Fix</button>
                <button class="btn-blue" onclick="fastLaunch('https://www.google.com')">Google</button>
            </div>
            <div class="btn-group" style="margin-bottom: 0;">
                <button class="btn-blue" style="background:#5865F2;" onclick="fastLaunch('https://discord.com')">Discord</button>
                <button class="btn-blue" style="background:#1f2937;" onclick="fastLaunch('https://wikipedia.org')">Wiki</button>
            </div>
        </div>

        <div class="panel-box">
            <h3>Arcade Deck (Unblocked Games)</h3>
            <div class="btn-group">
                <button class="btn-orange" onclick="fastLaunch('https://play2048.co/')">2048 Retro</button>
                <button class="btn-orange" onclick="fastLaunch('https://tetris.com/play-tetris')">Classic Tetris</button>
            </div>
            <div class="btn-group" style="margin-bottom: 0;">
                <button class="btn-orange" style="background: #047857;" onclick="fastLaunch('https://web-dashers.github.io')">Geo Dash</button>
                <button class="btn-orange" style="background: #4338ca;" onclick="fastLaunch('https://classic.minecraft.net')">Minecraft Web</button>
            </div>
        </div>

        <div class="panel-box">
            <h3>User Enforcement (Fixed ID)</h3>
            <input type="text" id="targetHardwareId" placeholder="Target HWID Profile...">
            <div class="btn-group" style="margin-bottom: 0;">
                <button class="btn-red" onclick="modifyUser('kick')">Kick</button>
                <button class="btn-red" style="background:#991b1b;" onclick="modifyUser('ban')">Ban</button>
                <button class="btn-green" onclick="modifyUser('unban')">Unban</button>
            </div>
            <div style="margin-top: 10px; max-height: 80px; overflow-y: auto;" id="sessionDisplay"></div>
        </div>

        <div class="panel-box" style="flex-grow: 1; display: flex; flex-direction: column; margin-bottom: 0;">
            <h3>Owner Console (CMD)</h3>
            <div id="cmd-terminal">Terminal configuration stable. Stream pipes aligned.</div>
            <input type="text" id="terminalInput" placeholder="Enter administrative script..." onkeydown="processCommand(event)">
        </div>
    </div>

    <div id="viewport">
        <div id="address-bar">
            <input type="text" id="targetUrl" value="https://www.youtube.com" style="margin: 0; flex-grow: 1;">
            <button class="btn-blue" style="width: auto; padding: 0 22px;" onclick="loadRequestedUrl()">Launch</button>
        </div>
        <iframe id="app-frame" src=""></iframe>
    </div>

    <script>
        let systemBanDatabase = new Set();
        let connectedDevices = [
            { id: "DEV-M410-9921-AZ", status: "Active" },
            { id: "DEV-2B88-1043-FF", status: "Active" }
        ];

        // Hardware identification calculation (Stays persistent even when browser storage clears)
        function generatePermanentID() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (!gl) return "DEV-GENERIC-CLIENT";
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                const renderer = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "";
                let hash = 0;
                const hardwareString = renderer + screen.colorDepth + navigator.hardwareConcurrency;
                for (let i = 0; i < hardwareString.length; i++) {
                    hash = (hash << 5) - hash + hardwareString.charCodeAt(i);
                    hash |= 0;
                }
                return "DEV-" + Math.abs(hash).toString(16).toUpperCase();
            } catch(e) {
                return "DEV-FAILSAFE-NODE";
            }
        }

        function refreshUserPanel() {
            const display = document.getElementById('sessionDisplay');
            display.innerHTML = '<span style="font-size: 11px; color: #9ca3af;">Network Hardware Signatures:</span>';
            
            const myID = generatePermanentID();
            display.innerHTML += `
                <div class="user-list-item" style="color: #60a5fa;">
                    <span>${myID} (You)</span>
                    <span>${systemBanDatabase.has(myID) ? '[BANNED]' : '[Admin]'}</span>
                </div>`;

            connectedDevices.forEach(device => {
                const isBanned = systemBanDatabase.has(device.id);
                display.innerHTML += `
                    <div class="user-list-item">
                        <span>${device.id}</span>
                        <span style="color: ${isBanned ? 'var(--danger-color)' : '#9ca3af'}">${isBanned ? '[BANNED]' : '[Online]'}</span>
                    </div>`;
            });
        }

        // Invidious API Pipeline Router to fix frame blocking on YouTube
        function launchYouTube() {
            document.getElementById('targetUrl').value = "https://www.youtube.com";
            printLog("[STREAM] Launching YouTube proxy video pipeline...");
            
            // Routes via an open Invidious mirror instance. This extracts pure YouTube assets
            // and streams videos instantly, ignoring school network flags or frame drops.
            document.getElementById('app-frame').src = "https://yewtu.be";
        }

        // Standard Navigation Core Engine
        function loadRequestedUrl() {
            let destination = document.getElementById('targetUrl').value.trim();
            if (!destination) return;

            if (destination.includes("youtube.com")) {
                launchYouTube();
                return;
            }

            if (!destination.startsWith('http://') && !destination.startsWith('https://')) {
                destination = 'https://' + destination;
            }

            const proxyActive = document.getElementById('vpnMode').checked;
            const frame = document.getElementById('app-frame');

            if (proxyActive) {
                printLog(`[STEALTH] Wrapping frameset layers for: ${destination}`);
                // Client-side open proxy encapsulation framework
                frame.src = "https://womginx.arph.org/main/" + destination;
            } else {
                printLog(`[DIRECT] Attempting unprotected connection pipeline: ${destination}`);
                frame.src = destination;
            }
        }

        function fastLaunch(siteUrl) {
            document.getElementById('targetUrl').value = siteUrl;
            loadRequestedUrl();
        }

        function updateProxyMode() {
            const enabled = document.getElementById('vpnMode').checked;
            const txt = document.getElementById('proxyStatus');
            if (enabled) {
                txt.innerText = "Traffic Status: Connected via Sandbox Proxy";
                txt.style.color = "var(--success-color)";
                printLog("[VPN] Dynamic routing layer active.");
            } else {
                txt.innerText = "Traffic Status: Direct (Unencrypted)";
                txt.style.color = "#9ca3af";
                printLog("[VPN] Bypassing dynamic routing layer.");
            }
        }

        function modifyUser(action) {
            const target = document.getElementById('targetHardwareId').value.trim();
            if (!target) { alert("Enter a Target hardware trace ID."); return; }

            if (action === 'ban') {
                systemBanDatabase.add(target);
                printLog(`[SECURITY] ID ${target} isolated and permanently banned.`);
            } else if (action === 'kick') {
                printLog(`[SECURITY] Active socket session severed for: ${target}`);
            } else if (action === 'unban') {
                systemBanDatabase.delete(target);
                printLog(`[SECURITY] Enforcement rules removed for: ${target}`);
            }
            refreshUserPanel();
        }

        function printLog(text) {
            const term = document.getElementById('cmd-terminal');
            term.innerHTML += `<br>> ${text}`;
            term.scrollTop = term.scrollHeight;
        }

        // Administrative Command Executions
        function processCommand(event) {
            if (event.key === 'Enter') {
                const element = document.getElementById('terminalInput');
                const rawCmd = element.value.trim();
                if (!rawCmd) return;

                printLog(`<span style="color:#fff;">owner$ ${rawCmd}</span>`);
                const tokens = rawCmd.split(' ');
                const command = tokens[0];

                switch(command) {
                    case '/clear':
                        document.getElementById('cmd-terminal').innerHTML = "Console log buffer wiped.";
                        break;
                    case '/vpn':
                        document.getElementById('vpnMode').click();
                        break;
                    case '/ban':
                        if (tokens[1]) {
                            systemBanDatabase.add(tokens[1]);
                            printLog(`Banned: ${tokens[1]}`);
                        } else {
                            printLog("Syntax Error. Use: /ban [ID]");
                        }
                        break;
                    case '/unban':
                        if (tokens[1]) {
                            systemBanDatabase.delete(tokens[1]);
                            printLog(`Restored: ${tokens[1]}`);
                        }
                        break;
                    case '/youtube':
                        launchYouTube();
                        break;
                    default:
                        printLog(`Command invalid. Available terminal tools: /youtube, /ban [id], /unban [id], /clear`);
                }
                element.value = '';
                refreshUserPanel();
            }
        }

        window.onload = function() {
            refreshUserPanel();
            launchYouTube(); // Direct launch safe view stream on initialization
        };
    </script>
</body>
</html>
